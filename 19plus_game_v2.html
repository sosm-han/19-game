<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>19+ 술게임</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
      color: white;
      text-align: center;
      padding: 20px;
      min-height: 100vh;
    }
    h1 { margin: 0 0 8px; }
    .sub { opacity: 0.8; margin-bottom: 16px; font-size: 14px; }
    .status {
      margin: 0 auto 16px;
      padding: 10px 14px;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      font-size: 14px;
    }
    input {
      width: min(320px, 85vw);
      padding: 12px;
      border: 0;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 16px;
    }
    .btn-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    .truth { background: #ff006e; color: #fff; }
    .dare { background: #00b4d8; color: #fff; }
    .penalty { background: #ffb703; color: #111; }
    .reset { background: #adb5bd; color: #111; }

    .card {
      margin: 24px auto 0;
      max-width: 720px;
      min-height: 180px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .badge {
      display: inline-block;
      margin: 0 auto 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      font-size: 12px;
      opacity: 0.95;
    }
    .player {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    #result {
      font-size: 20px;
      line-height: 1.6;
      word-break: keep-all;
    }
    .notice {
      max-width: 720px;
      margin: 14px auto 0;
      font-size: 12px;
      opacity: 0.75;
      line-height: 1.5;
    }
    @media (max-width: 640px) {
      #result { font-size: 18px; }
      button { width: calc(50% - 10px); }
    }
  </style>
</head>
<body>
  <h1>🔥 19+ 술게임</h1>
  <div class="sub">질문/도전 10개마다 자동 레벨업</div>

  <div class="status">
    Level <span id="level">1</span> · 진행 <span id="count">0</span>/10
  </div>

  <input type="text" id="playerName" placeholder="이름 입력" />

  <div class="btn-wrap">
    <button class="truth" onclick="getTruth()">Truth</button>
    <button class="dare" onclick="getDare()">Dare</button>
    <button class="penalty" onclick="getPenalty()">벌칙</button>
    <button class="reset" onclick="resetGame()">리셋</button>
  </div>

  <div class="card">
    <div class="badge" id="modeLabel">START</div>
    <div class="player" id="player"></div>
    <div id="result">버튼을 눌러 시작!</div>
  </div>

  <div class="notice">
    실제 플레이용으로 수위를 조정한 버전입니다. 접촉이 포함될 수 있는 도전은 모두 상호 동의가 전제입니다.
  </div>

  <script>
    let count = 0;
    let level = 1;

    const truths = [
      [
        "이 자리에서 가장 첫인상이 좋았던 사람은?",
        "누군가에게 호감이 생길 때 가장 먼저 보는 포인트는?",
        "지금 가장 눈이 자주 가는 사람은?",
        "최근 가장 설렜던 순간은?",
        "이상형의 분위기를 세 단어로 말해봐.",
        "누군가를 매력적으로 느낄 때 가장 중요한 건 뭐야?",
        "이성에게 가장 어필하고 싶은 내 매력은?",
        "가장 로맨틱하다고 생각하는 데이트 장소는?",
        "키스 분위기에서 가장 중요한 요소 하나만 꼽는다면?",
        "이 자리에서 같이 드라이브 가고 싶은 사람은?"
      ],
      [
        "은은한 조명 vs 완전한 어둠, 더 설레는 분위기는?",
        "누군가에게 살짝 끌릴 때 스스로 티가 나는 편이야?",
        "듣고 가장 설렐 것 같은 한마디는?",
        "지금 이 자리에서 가장 긴장되는 사람은?",
        "플러팅할 때 말투가 중요한 편이야, 분위기가 중요한 편이야?",
        "가장 기억에 남는 키스 분위기를 한 줄로 표현해봐.",
        "상대의 어떤 향이나 스타일에 가장 약해?",
        "눈빛, 목소리, 손, 어깨 중 가장 설레는 포인트는?",
        "누군가와 묘한 텐션이 생길 때 보통 먼저 다가가는 편이야?",
        "오늘 여기서 가장 매력적으로 느껴지는 분위기의 사람은?"
      ],
      [
        "말할 수 있는 선에서 가장 은밀한 판타지를 한 줄로 말해봐.",
        "상상만 해도 얼굴 빨개지는 상황 하나 말해봐.",
        "분위기가 무르익었을 때 가장 중요하다고 생각하는 건?",
        "가장 관능적이라고 느끼는 제스처는?",
        "누군가 귓가에 속삭여주면 설렐 말은?",
        "직접 스킨십보다 눈빛 텐션이 더 강하다고 느낀 적 있어?",
        "파트너에게서 가장 치명적이라고 느끼는 분위기는?",
        "묘하게 자극적인데 말로 설명하기 어려운 포인트 하나는?",
        "누군가에게 강하게 끌리는 순간을 한 문장으로 말해봐.",
        "이런 게임에서 받아본 가장 대담한 질문은?"
      ]
    ];

    const dares = [
      [
        "왼쪽 사람을 10초 동안 보고 매력 포인트 하나 말하기.",
        "한 사람을 골라 칭찬 세 가지 하기.",
        "30초 동안 자신감 넘치는 표정 연기하기.",
        "원하는 사람 한 명과 10초 아이컨택하기.",
        "오늘의 본인 매력을 한 문장으로 어필하기.",
        "가장 자신 있는 표정으로 카메라 없는 셀카 포즈 하기.",
        "맞은편 사람에게 영화 대사처럼 한마디 건네기.",
        "손하트 또는 윙크 중 하나 선택해서 하기.",
        "누군가를 지목해 '오늘 제일 스타일 좋다'고 말하기.",
        "5초 동안 모델 워킹하기."
      ],
      [
        "한 사람을 골라 아주 가까이서 5초간 눈 맞추기.",
        "누군가를 지목해 설레는 칭찬 한마디 하기.",
        "노래 없이 15초 동안 섹시한 춤 흉내내기.",
        "오늘 밤 어울리는 플러팅 멘트 한 줄 말하기.",
        "한 사람을 골라 그 사람의 분위기를 영화 주인공처럼 묘사하기.",
        "의미심장한 윙크를 세 명에게 날리기.",
        "아무 단어나 하나 받아서 순진하게, 섹시하게 두 버전으로 말하기.",
        "그룹에게 어른스러운 건배사 제안하기.",
        "누군가를 보고 아주 천천히 미소 짓기.",
        "립싱크로 로맨틱한 노래 한 소절 연기하기."
      ],
      [
        "상호 동의한 사람과 15초 아이컨택 후 동시에 웃지 않기.",
        "누군가를 골라 그 사람의 가장 치명적인 분위기 포인트 말하기.",
        "상호 동의하에 손등이나 팔에 작은 하트를 그려주기.",
        "누군가 바로 앞에서 아주 낮은 목소리로 한 문장 속삭이기.",
        "상호 동의한 사람과 손끝만 5초 맞대기.",
        "의자에 앉은 채 가장 도발적인 포즈 10초 유지하기.",
        "에로 소설의 한 장면처럼 아무 사물 하나를 관능적으로 묘사하기.",
        "누군가를 보고 '불타는 눈빛' 5초 시전하기.",
        "오늘 파티 분위기를 10점 만점으로 평가하고 가장 짜릿한 이유 말하기.",
        "상호 동의한 사람과 어깨 맞대고 사진 찍는 척 포즈 취하기."
      ]
    ];

    const penalties = [
      "한 잔 마시기 🍺",
      "두 모금 연속 마시기 🍻",
      "건배사 하고 마시기 🥂",
      "다음 턴까지 존댓말 금지",
      "다음 턴까지 특정 사람 칭찬만 하기",
      "오늘 분위기에 어울리는 별명 하나 공개하기",
      "5초 동안 유혹적인 표정 짓기",
      "노래 한 소절 부르기",
      "다음 사람에게 벌칙 하나 추천하기",
      "한 사람을 지목해 가장 매력적인 포인트 말하기"
    ];

    function getPlayer() {
      const name = document.getElementById("playerName").value.trim();
      return name || "플레이어";
    }

    function updateProgress() {
      count++;
      if (count >= 10) {
        level++;
        count = 0;
        alert("🔥 레벨업! Level " + level);
      }
      document.getElementById("level").innerText = level;
      document.getElementById("count").innerText = count;
    }

    function getLevelIndex(arr) {
      return Math.min(level - 1, arr.length - 1);
    }

    function setCard(mode, text) {
      document.getElementById("modeLabel").innerText = mode;
      document.getElementById("player").innerText = getPlayer();
      document.getElementById("result").innerText = text;
    }

    function getTruth() {
      const idx = getLevelIndex(truths);
      const item = truths[idx][Math.floor(Math.random() * truths[idx].length)];
      setCard("TRUTH", item);
      updateProgress();
    }

    function getDare() {
      const idx = getLevelIndex(dares);
      const item = dares[idx][Math.floor(Math.random() * dares[idx].length)];
      setCard("DARE", item);
      updateProgress();
    }

    function getPenalty() {
      const item = penalties[Math.floor(Math.random() * penalties.length)];
      setCard("PENALTY", "🔥 벌칙: " + item);
    }

    function resetGame() {
      count = 0;
      level = 1;
      document.getElementById("level").innerText = level;
      document.getElementById("count").innerText = count;
      document.getElementById("modeLabel").innerText = "START";
      document.getElementById("player").innerText = "";
      document.getElementById("result").innerText = "버튼을 눌러 시작!";
    }
  </script>
</body>
</html>
