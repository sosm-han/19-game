<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>19+ 룰렛 술게임</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#1e1e2f,#3a0ca3);
    color:white;
    text-align:center;
    padding:20px;
}

h1 { margin-bottom:10px; }

.players {
    margin-bottom:15px;
    font-size:14px;
    opacity:0.8;
}

.btn {
    padding:14px 20px;
    margin:8px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.spin { background:#ff006e; }
.penalty { background:#ffaa00; color:black; }

.card {
    margin-top:30px;
    padding:30px;
    background:rgba(255,255,255,0.1);
    border-radius:14px;
    min-height:150px;
}

.player {
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.result {
    font-size:20px;
    line-height:1.5;
}

/* 룰렛 애니메이션 느낌 */
.spin-effect {
    animation: spinText 0.6s ease;
}

@keyframes spinText {
    0% { transform:scale(0.8); opacity:0; }
    50% { transform:scale(1.1); }
    100% { transform:scale(1); opacity:1; }
}
</style>
</head>

<body>

<h1>🔥 룰렛 술게임</h1>

<div class="players" id="players"></div>

<button class="btn spin" onclick="spin()">🎡 돌리기</button>
<button class="btn penalty" onclick="penalty()">🔥 벌칙</button>

<div class="card">
    <div class="player" id="player"></div>
    <div class="result" id="result">버튼을 눌러 시작!</div>
</div>

<script>

// 👉 플레이어 미리 설정
const playerList = ["민수","지연","현우","수빈"];

let currentIndex = 0;
let level = 1;
let count = 0;

document.getElementById("players").innerText = 
"참여자: " + playerList.join(", ");

// 질문 (레벨별)
const missions = [
[
"가장 눈이 가는 사람 지목하기",
"왼쪽 사람 칭찬 3가지",
"아이컨택 10초 하기",
"오늘 제일 매력적인 사람 말하기",
"자기 매력 10초 어필",
"누군가에게 플러팅 한마디",
"이상형 한줄 설명",
"가장 설렜던 순간 말하기",
"누군가에게 의미심장한 윙크",
"손하트 보내기"
],
[
"마음에 드는 사람에게 한마디",
"10초 동안 눈 못 피하기",
"설레는 멘트 한 줄 하기",
"가장 끌리는 사람 지목",
"상대 장점 말해주기",
"30초 퍼포먼스 하기",
"의미심장한 눈빛 보내기",
"누군가를 영화 주인공처럼 묘사",
"가장 긴장되는 사람 말하기",
"플러팅 멘트 하기"
],
[
"은근히 끌리는 사람 말하기",
"가장 설레는 순간 묘사",
"눈빛으로만 어필하기 5초",
"누군가에게 속삭이기",
"이 자리에서 가장 텐션 좋은 사람",
"이상적인 분위기 설명",
"누군가에게 한마디 던지기",
"오늘 분위기 평가하기",
"누군가와 눈 맞추고 웃기",
"가장 매력적인 포인트 말하기"
]
];

const penalties = [
"한 잔 마시기 🍺",
"두 잔 마시기 🍻",
"건배사 하기",
"노래 한 소절 부르기",
"다음 턴까지 말 금지",
"애교 5초",
"벌칙 2배",
"자기소개 다시 하기"
];

function nextPlayer(){
    const player = playerList[currentIndex];
    currentIndex = (currentIndex + 1) % playerList.length;
    return player;
}

function spin(){

    const player = nextPlayer();
    const levelIndex = Math.min(level-1, missions.length-1);

    const list = missions[levelIndex];
    const random = list[Math.floor(Math.random()*list.length)];

    const resultEl = document.getElementById("result");

    resultEl.classList.remove("spin-effect");
    void resultEl.offsetWidth; // reflow
    resultEl.classList.add("spin-effect");

    document.getElementById("player").innerText = player;
    resultEl.innerText = random;

    count++;
    if(count >= 10){
        level++;
        count = 0;
        alert("🔥 레벨업!");
    }
}

function penalty(){

    const player = nextPlayer();
    const random = penalties[Math.floor(Math.random()*penalties.length)];

    document.getElementById("player").innerText = player;
    document.getElementById("result").innerText = "🔥 벌칙: " + random;
}

</script>

</body>
</html>
